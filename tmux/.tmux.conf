# ─── General ─────────────────────────────────────────────────────────────────

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Increase scrollback buffer
set -g history-limit 50000

# Enable mouse (scroll, click pane, resize)
set -g mouse on

# Remove escape delay
set -sg escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ─── Status Bar ──────────────────────────────────────────────────────────────

set -g status on
set -g status-interval 5
set -g status-position bottom

# Colors
COLOR_BG="#1e1e2e"
COLOR_FG="#cdd6f4"
COLOR_ACCENT="#89b4fa"
COLOR_GREEN="#a6e3a1"
COLOR_YELLOW="#f9e2af"
COLOR_RED="#f38ba8"
COLOR_MUTED="#6c7086"
COLOR_ACTIVE="#313244"

set -g status-style "bg=${COLOR_BG} fg=${COLOR_FG}"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=${COLOR_ACCENT},fg=${COLOR_BG},bold] #S #[bg=${COLOR_BG},fg=${COLOR_ACCENT}] "

# Right: CPU-ish info + date/time
set -g status-right-length 80
set -g status-right "#[fg=${COLOR_MUTED}]#[fg=${COLOR_MUTED}] %a %d %b #[fg=${COLOR_ACCENT}] #[fg=${COLOR_FG},bold]%H:%M #[bg=${COLOR_ACCENT},fg=${COLOR_BG},bold] #h "

# Window list (center)
set -g status-justify left
setw -g window-status-format "#[fg=${COLOR_MUTED}] #I:#W "
setw -g window-status-current-format "#[bg=${COLOR_ACTIVE},fg=${COLOR_ACCENT},bold] #I:#W#{?window_zoomed_flag, ,} "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=${COLOR_MUTED}"
set -g pane-active-border-style "fg=${COLOR_ACCENT}"

# Message style
set -g message-style "bg=${COLOR_ACCENT} fg=${COLOR_BG} bold"
